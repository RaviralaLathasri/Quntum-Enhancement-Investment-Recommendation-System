<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Quant Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0B0E14', panelBg: '#151A22', quantPurple: '#8B5CF6' } } }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-panel { background: rgba(21, 26, 34, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-btn { background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); transition: all 0.3s ease; }
        .glow-btn:hover { box-shadow: 0 6px 25px rgba(139, 92, 246, 0.7); transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-darkBg text-slate-200 p-4 font-sans">

    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-quantPurple rounded-full mix-blend-multiply filter blur-[128px] opacity-20 pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 pointer-events-none"></div>

    <div class="glass-panel p-8 rounded-2xl w-full max-w-md relative z-10 shadow-2xl transition-all duration-300">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-full bg-gray-900 border-2 border-quantPurple/50 mx-auto mb-4 flex items-center justify-center text-3xl shadow-[0_0_20px_rgba(139,92,246,0.3)] text-quantPurple">
                <i class="fas fa-fingerprint"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-wider text-white" id="formTitle">SYSTEM LOGIN</h1>
            <p class="text-xs text-gray-400 font-mono tracking-widest uppercase mt-2">Nano Banana Core Engine</p>
        </div>

        <div id="errorBox" class="hidden bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-lg mb-4 text-sm font-mono text-center"></div>
        <div id="successBox" class="hidden bg-green-500/10 border border-green-500/50 text-green-400 p-4 rounded-lg mb-4 text-sm font-mono text-center leading-relaxed"></div>

        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="space-y-4 mb-6">
                
                <div id="signupFields" class="hidden space-y-4 transition-all duration-300">
                    <div>
                        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Full Name</label>
                        <div class="relative">
                            <i class="fas fa-id-badge absolute left-3 top-3.5 text-gray-500"></i>
                            <input type="text" id="name" class="w-full bg-black/50 border border-gray-700 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-quantPurple transition-colors font-mono" placeholder="Investor Name">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Age (For Risk Profiling)</label>
                        <div class="relative">
                            <i class="fas fa-calendar absolute left-3 top-3.5 text-gray-500"></i>
                            <input type="number" id="age" min="18" max="100" class="w-full bg-black/50 border border-gray-700 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-quantPurple transition-colors font-mono" placeholder="e.g., 30">
                        </div>
                    </div>
                </div>

                <div>
                    <label id="identifierLabel" class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Email or Secure ID</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-3.5 text-gray-500"></i>
                        <input type="text" id="identifier" required class="w-full bg-black/50 border border-gray-700 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-quantPurple transition-colors font-mono" placeholder="USR-XXXX or email@domain.com">
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs text-gray-400 uppercase tracking-wider mb-2">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-3.5 text-gray-500"></i>
                        <input type="password" id="password" required class="w-full bg-black/50 border border-gray-700 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-quantPurple transition-colors font-mono" placeholder="••••••••">
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full glow-btn text-white font-bold py-3 rounded-lg uppercase tracking-wider text-sm mb-4">
                <i class="fas fa-bolt mr-2"></i> Initialize Session
            </button>
        </form>

        <div class="text-center border-t border-gray-800 pt-4 mt-2">
            <p class="text-sm text-gray-400" id="toggleText">
                No clearance? <a href="#" onclick="toggleMode()" class="text-quantPurple hover:text-white transition-colors font-bold">Request Access (Sign Up)</a>
            </p>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            
            // Toggle UI Texts
            document.getElementById('formTitle').innerText = isLoginMode ? 'SYSTEM LOGIN' : 'CREATE ACCOUNT';
            document.getElementById('submitBtn').innerHTML = isLoginMode ? '<i class="fas fa-bolt mr-2"></i> Initialize Session' : '<i class="fas fa-user-plus mr-2"></i> Register Credentials';
            
            document.getElementById('toggleText').innerHTML = isLoginMode ? 
                'No clearance? <a href="#" onclick="toggleMode()" class="text-quantPurple hover:text-white transition-colors font-bold">Request Access (Sign Up)</a>' : 
                'Have clearance? <a href="#" onclick="toggleMode()" class="text-quantPurple hover:text-white transition-colors font-bold">Authenticate (Log In)</a>';
            
            // Toggle Form Fields dynamically
            const signupFields = document.getElementById('signupFields');
            const identifierLabel = document.getElementById('identifierLabel');
            const identifierInput = document.getElementById('identifier');

            if (isLoginMode) {
                // Login Mode
                signupFields.classList.add('hidden');
                document.getElementById('name').removeAttribute('required');
                document.getElementById('age').removeAttribute('required');
                identifierLabel.innerText = "Email or Secure ID";
                identifierInput.placeholder = "USR-XXXX or email@domain.com";
                identifierInput.type = "text";
            } else {
                // Sign Up Mode
                signupFields.classList.remove('hidden');
                document.getElementById('name').setAttribute('required', 'true');
                document.getElementById('age').setAttribute('required', 'true');
                identifierLabel.innerText = "Email Address";
                identifierInput.placeholder = "investor@domain.com";
                identifierInput.type = "email";
            }

            // Clear messages
            document.getElementById('errorBox').classList.add('hidden');
            document.getElementById('successBox').classList.add('hidden');
        }

        async function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Processing...';
            errorBox.classList.add('hidden');
            successBox.classList.add('hidden');

            const endpoint = isLoginMode ? '/api/login' : '/api/signup';
            const formData = new FormData();
            
            // Append correct fields based on mode
            if (isLoginMode) {
                formData.append('login_identifier', document.getElementById('identifier').value);
                formData.append('password', document.getElementById('password').value);
            } else {
                formData.append('name', document.getElementById('name').value);
                formData.append('email', document.getElementById('identifier').value);
                formData.append('age', document.getElementById('age').value);
                formData.append('password', document.getElementById('password').value);
            }

            try {
                const response = await fetch(endpoint, { method: 'POST', body: formData });
                const data = await response.json();

                if (data.error) {
                    errorBox.innerText = data.error;
                    errorBox.classList.remove('hidden');
                } else if (!isLoginMode) {
                    // Successful Signup
                    successBox.innerHTML = `<strong>Registration Complete!</strong><br/>${data.message}`;
                    successBox.classList.remove('hidden');
                    document.getElementById('authForm').reset();
                    // Give them 5 seconds to write down their new USR-ID before switching to login
                    setTimeout(toggleMode, 5000); 
                } else {
                    // Successful Login
                    window.location.href = '/'; // Redirect to terminal dashboard
                }
            } catch (err) {
                errorBox.innerText = "Connection error to core engine.";
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = isLoginMode ? '<i class="fas fa-bolt mr-2"></i> Initialize Session' : '<i class="fas fa-user-plus mr-2"></i> Register Credentials';
            }
        }
    </script>
</body>
</html>
